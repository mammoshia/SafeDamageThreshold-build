[General]
; 1 = player only. 0 = apply DT to every actor.
bPlayerOnly=1

; Enable armor-derived DT outside and inside power armor.
bEnableNormalArmorDT=1
bEnablePowerArmorDT=1

[Threshold]
; 0.02 = 2 percent of the currently displayed armor rating.
fNormalPhysicalPercent=0.02
fNormalEnergyPercent=0.02
fPowerArmorPhysicalPercent=0.02
fPowerArmorEnergyPercent=0.02

; Safety cap. 0 disables the cap.
fMaximumThreshold=100.0

[Debug]
; Per-hit logging is very verbose. Enable only while testing.
bLogHits=0

